# Monorepo GitLab CI — Ruff, frontend tooling, and per-service pytest.
# Default tag is required for IPB shared runners; untagged jobs are never scheduled.

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

stages:
  - lint
  - test

default:
  interruptible: true
  tags:
    - shared

variables:
  PIP_ROOT_USER_ACTION: ignore
  DJANGO_SECRET_KEY: ci-not-secret-change-in-real-envs

ruff:
  stage: lint
  image: python:3.12-slim-bookworm
  before_script:
    - python -m pip install --no-cache-dir ruff
  script:
    - ruff check .
    - ruff format --check .

node:lint:
  stage: lint
  image: node:20.18-bookworm
  before_script:
    - npm ci
    - test -d frontend && npm --prefix frontend ci
  script:
    - npm run lint
    - npm run format:check

pytest:services:
  stage: test
  image: python:3.12-bookworm
  parallel:
    matrix:
      - SERVICE_DIR:
          [
            services/auth-service,
            services/company-service,
            services/contract-service,
            services/finance-service,
            services/space-service,
            services/booking-service,
            services/inventory-service,
            services/ticket-service,
            services/dashboard-service,
            services/document-service,
          ]
  before_script:
    - apt-get update -qq && apt-get install -y -qq libpq-dev gcc
    - python -m pip install --no-cache-dir -U pip
    - python -m pip install --no-cache-dir -e "libs/py-common[dev]"
    - python -m pip install --no-cache-dir -r "${SERVICE_DIR}/requirements.txt"
  script:
    - cd "${SERVICE_DIR}" && python -m pytest -q
