# Monorepo GitLab CI — validates the stack, tests changed code, builds changed
# images, pushes them to the GitLab container registry, and deploys production.

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

stages:
  - validate
  - lint
  - test
  - build
  - e2e
  - deploy

default:
  interruptible: true
  tags:
    - shared

variables:
  PIP_ROOT_USER_ACTION: ignore
  DJANGO_SECRET_KEY: ci-not-secret-change-in-real-envs
  DOCKER_COMPOSE_V2_VERSION: '2.31.0'
  DOCKER_TLS_CERTDIR: ''
  IMAGE_TAG: $CI_COMMIT_SHA
  DEPLOY_PATH: /home/a69603/ilb
  DEPLOY_USER: a69603

compose:validate:
  stage: validate
  image: debian:12-slim
  before_script:
    - |
      set -eu
      apt-get update -qq && apt-get install -y -qq ca-certificates curl
      ARCH="$(uname -m)"
      case "$ARCH" in
        x86_64) COMPOSE_ARCH="x86_64" ;;
        aarch64|arm64) COMPOSE_ARCH="aarch64" ;;
        *) echo "Unsupported arch: $ARCH"; exit 1 ;;
      esac
      curl -fsSL "https://github.com/docker/compose/releases/download/v${DOCKER_COMPOSE_V2_VERSION}/docker-compose-linux-${COMPOSE_ARCH}" -o /usr/local/bin/docker-compose
      chmod +x /usr/local/bin/docker-compose
  script:
    - cp .env.example .env
    - docker-compose -f infra/docker-compose.yml --project-directory . config --quiet
    - CI_REGISTRY_IMAGE=registry.example.invalid/ilb IMAGE_TAG=test docker-compose -f infra/docker-compose.yml -f infra/docker-compose.production.yml --project-directory . config --quiet

changed:services:
  stage: validate
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash git
  script:
    - bash infra/scripts/ci/detect-changed-services.sh
  artifacts:
    reports:
      dotenv: changed-services.env
    paths:
      - changed-services.env
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

include:
  - local: '.gitlab/ci/backend.yml'
  - local: '.gitlab/ci/frontend.yml'
  - local: '.gitlab/ci/e2e.yml'

build:changed-images:
  stage: build
  image: docker:27.3.1-cli
  services:
    - name: docker:27.3.1-dind
      alias: docker
  needs:
    - job: changed:services
      artifacts: true
  before_script:
    - apk add --no-cache bash
  script:
    - bash infra/scripts/ci/build-and-push.sh
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - when: never

# Automatic production rollout from main. The SSH host and password are
# injected as protected GitLab CI/CD variables; the course VM user is fixed.
deploy:production:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: changed:services
      artifacts: true
    - job: build:changed-images
      optional: true
  before_script:
    - apk add --no-cache bash git openssh-client sshpass tar
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - if [ -n "${DEPLOY_KNOWN_HOSTS:-}" ]; then printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts; fi
  script:
    - bash infra/scripts/ci/deploy-remote.sh
  environment:
    name: production
    url: $PRODUCTION_URL
  resource_group: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - when: never

seed:production:
  stage: deploy
  image: alpine:3.20
  needs: []
  before_script:
    - apk add --no-cache bash openssh-client sshpass
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - if [ -n "${DEPLOY_KNOWN_HOSTS:-}" ]; then printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts; fi
  script:
    - bash infra/scripts/ci/seed-remote.sh
  environment:
    name: production
    url: $PRODUCTION_URL
  resource_group: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: false
    - when: never
