            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/api/documents/[^/]+/download {
            include /etc/nginx/includes/proxy_auth.inc;
            proxy_pass http://document_service;
        }

        location ^~ /api/auth/ {
            include /etc/nginx/includes/proxy_auth.inc;
            proxy_pass http://auth_service;
        }

        location ^~ /api/companies/ {
            include /etc/nginx/includes/proxy_auth.inc;
            proxy_pass http://company_service;
        }

        location ^~ /api/contracts/ {
            include /etc/nginx/includes/proxy_auth.inc;
            proxy_pass http://contract_service;
        }

        location ^~ /api/finance/ {
            include /etc/nginx/includes/proxy_auth.inc;
            proxy_pass http://finance_service;
        }

        location = /api/space-types {
            include /etc/nginx/includes/proxy_auth.inc;
            proxy_pass http://space_service;
        }

        location ^~ /api/space-types/ {
            include /etc/nginx/includes/proxy_auth.inc;
            proxy_pass http://space_service;
        }

        location ^~ /api/spaces/ {
            include /etc/nginx/includes/proxy_auth.inc;
            proxy_pass http://space_service;
