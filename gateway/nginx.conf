            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/auth/health {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/companies/health {
            proxy_pass http://company_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/contracts/health {
            proxy_pass http://contract_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/finance/health {
            proxy_pass http://finance_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/spaces/health {
            proxy_pass http://space_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/bookings/health {
            proxy_pass http://booking_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/inventory/health {
            proxy_pass http://inventory_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/tickets/health {
            proxy_pass http://ticket_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/dashboard/health {
            proxy_pass http://dashboard_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/documents/health {
            proxy_pass http://document_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/auth/schema {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/auth/metrics {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/companies/schema {
            proxy_pass http://company_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/companies/metrics {
            proxy_pass http://company_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/contracts/schema {
            proxy_pass http://contract_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/contracts/metrics {
            proxy_pass http://contract_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/finance/schema {
            proxy_pass http://finance_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/finance/metrics {
