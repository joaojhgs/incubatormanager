worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

# Path-prefix routing: /api/<prefix>/** → Django service (see map + upstream names).
# Health uses longer ^~ locations than the authenticated prefix so /health/ skips auth_request.
# auth_request → auth-service /auth/verify/ (JWT access validation).

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    server_tokens off;
    client_max_body_size 50m;

    proxy_cache_path /var/cache/nginx/auth
        levels=1:2
        keys_zone=auth_cache:1m
        max_size=10m
        inactive=10m
        use_temp_path=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream auth_service {
        server auth-service:8001;
    }

    upstream company_service {
        server company-service:8002;
    }

    upstream contract_service {
        server contract-service:8003;
    }

    upstream finance_service {
        server finance-service:8004;
    }

    upstream space_service {
        server space-service:8005;
    }

    upstream booking_service {
        server booking-service:8006;
    }

    upstream inventory_service {
        server inventory-service:8007;
    }

    upstream ticket_service {
        server ticket-service:8008;
    }

    upstream dashboard_service {
        server dashboard-service:8009;
    }

    upstream document_service {
        server document-service:8010;
    }

    upstream frontend_app {
        server frontend:3000;
    }

    server {
        listen 8080;
        server_name _;


        location = /docs {
            default_type text/html;
            alias /etc/nginx/html/docs-index.html;
        }

        location = /docs/ {
            default_type text/html;
            alias /etc/nginx/html/docs-index.html;
        }

        location = /health {
            default_type text/plain;
            return 200 'ok';
        }

        location = /auth/verify {
            internal;
            proxy_pass http://auth_service/auth/verify/;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host localhost;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
            proxy_cache auth_cache;
            proxy_cache_key $http_authorization;
            proxy_cache_valid 200 10s;
            proxy_cache_valid 401 2s;
            proxy_cache_lock on;
        }

        location = /auth/introspect {
            internal;
            proxy_pass http://auth_service/auth/introspect/;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host localhost;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
        }

        location = /api/auth/login {
            proxy_pass http://auth_service/api/auth/login/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/auth/login/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/auth/refresh {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/auth/logout {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/bookings/external {
            proxy_pass http://booking_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/bookings/public-calendar {
            proxy_pass http://booking_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/public/spaces/ {
            proxy_pass http://space_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/public/inventory/equipment/ {
            proxy_pass http://inventory_service;
