worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    server_tokens off;
    client_max_body_size 50m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream auth_service {
        server auth-service:8001;
    }

    upstream company_service {
        server company-service:8002;
    }

    upstream contract_service {
        server contract-service:8003;
    }

    upstream finance_service {
        server finance-service:8004;
    }

    upstream space_service {
        server space-service:8005;
    }

    upstream booking_service {
        server booking-service:8006;
    }

    upstream inventory_service {
        server inventory-service:8007;
    }

    upstream ticket_service {
        server ticket-service:8008;
    }

    upstream dashboard_service {
        server dashboard-service:8009;
    }

    upstream document_service {
        server document-service:8010;
    }

    upstream frontend_app {
        server frontend:3000;
    }

    server {
        listen 8080;
        server_name _;

        location = /health {
            default_type text/plain;
            return 200 'ok';
        }

        location = /auth/introspect {
            internal;
            proxy_pass http://auth_service/auth/introspect/;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
        }

        location ^~ /api/auth/login {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/auth/refresh {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/bookings/external {
            proxy_pass http://booking_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/auth/health {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/companies/health {
            proxy_pass http://company_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/contracts/health {
            proxy_pass http://contract_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/finance/health {
            proxy_pass http://finance_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/spaces/health {
            proxy_pass http://space_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/bookings/health {
            proxy_pass http://booking_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/inventory/health {
            proxy_pass http://inventory_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/tickets/health {
            proxy_pass http://ticket_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/dashboard/health {
            proxy_pass http://dashboard_service;
            proxy_set_header Host $host;
        }

        location ^~ /api/documents/health {
            proxy_pass http://document_service;
            proxy_set_header Host $host;
        }

        location ~ ^/api/documents/[^/]+/download {
            proxy_pass http://document_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/auth/ {
            auth_request /auth/introspect;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $company_id $upstream_http_x_company_id;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-Company-Id $company_id;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/companies/ {
            auth_request /auth/introspect;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $company_id $upstream_http_x_company_id;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-Company-Id $company_id;
            proxy_pass http://company_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/contracts/ {
            auth_request /auth/introspect;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $company_id $upstream_http_x_company_id;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-Company-Id $company_id;
            proxy_pass http://contract_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/finance/ {
            auth_request /auth/introspect;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $company_id $upstream_http_x_company_id;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-Company-Id $company_id;
            proxy_pass http://finance_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/spaces/ {
            auth_request /auth/introspect;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $company_id $upstream_http_x_company_id;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-Company-Id $company_id;
            proxy_pass http://space_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/bookings/ {
            auth_request /auth/introspect;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $company_id $upstream_http_x_company_id;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-Company-Id $company_id;
            proxy_pass http://booking_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/inventory/ {
            auth_request /auth/introspect;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $company_id $upstream_http_x_company_id;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-Company-Id $company_id;
            proxy_pass http://inventory_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/tickets/ {
            auth_request /auth/introspect;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $company_id $upstream_http_x_company_id;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-Company-Id $company_id;
            proxy_pass http://ticket_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/dashboard/ {
            auth_request /auth/introspect;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $company_id $upstream_http_x_company_id;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-Company-Id $company_id;
            proxy_pass http://dashboard_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/documents/ {
            auth_request /auth/introspect;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $company_id $upstream_http_x_company_id;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-Company-Id $company_id;
            proxy_pass http://document_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
