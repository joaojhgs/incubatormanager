name: ilb

x-django-env: &django-env
  TZ: Europe/Lisbon
  DJANGO_DEBUG: 'true'
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
  ALLOWED_HOSTS: '*'
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
  REDIS_URL: redis://redis:6379/0
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  MINIO_BUCKET: ilb-documents
  MINIO_USE_SSL: 'false'
  JWT_ISSUER: ilb-auth
  JWT_AUDIENCE: ilb-gateway
  JWT_ACCESS_TTL_SECONDS: '900'
  JWT_REFRESH_TTL_SECONDS: '604800'

x-service-build: &service-build
  context: ${COMPOSE_REPO_ROOT:-${PWD}}

x-consumer-deps: &consumer-deps
  postgres:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy

x-scheduler-volumes: &scheduler-volumes
  - ${COMPOSE_REPO_ROOT:-${PWD}}/infra/cron:/app/infra/cron:ro
  - ${COMPOSE_REPO_ROOT:-${PWD}}/infra/scripts:/app/infra/scripts:ro

services:
  postgres:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      COMPANY_DB_PASSWORD: ${COMPANY_DB_PASSWORD}
      CONTRACT_DB_PASSWORD: ${CONTRACT_DB_PASSWORD}
      FINANCE_DB_PASSWORD: ${FINANCE_DB_PASSWORD}
      SPACE_DB_PASSWORD: ${SPACE_DB_PASSWORD}
      BOOKING_DB_PASSWORD: ${BOOKING_DB_PASSWORD}
      INVENTORY_DB_PASSWORD: ${INVENTORY_DB_PASSWORD}
      TICKET_DB_PASSWORD: ${TICKET_DB_PASSWORD}
      DASHBOARD_DB_PASSWORD: ${DASHBOARD_DB_PASSWORD}
      DOCUMENT_DB_PASSWORD: ${DOCUMENT_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ${COMPOSE_REPO_ROOT:-${PWD}}/infra/docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/01-init-databases.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4.2-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13.7-management-alpine
    environment:
      TZ: Europe/Lisbon
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ${COMPOSE_REPO_ROOT:-${PWD}}/infra/docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ${COMPOSE_REPO_ROOT:-${PWD}}/infra/docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/conf.d/10-definitions.conf:ro
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      TZ: Europe/Lisbon
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z-cpuv1
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ${COMPOSE_REPO_ROOT:-${PWD}}/infra/scripts/minio-init.sh:/scripts/minio-init.sh:ro
    entrypoint: ['/bin/sh', '/scripts/minio-init.sh']
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ilb-documents
      MINIO_USE_SSL: 'false'
    restart: 'no'

  auth-service:
    build:
      <<: *service-build
      dockerfile: services/auth-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://auth_svc:${AUTH_DB_PASSWORD}@postgres:5432/auth_db
      AUTH_DEV_SEED_PASSWORD: ${AUTH_DEV_SEED_PASSWORD}
      AUTH_DEV_SEED_DIRECTOR_PASSWORD: ${AUTH_DEV_SEED_DIRECTOR_PASSWORD:-}
      AUTH_DEV_SEED_STAFF_PASSWORD: ${AUTH_DEV_SEED_STAFF_PASSWORD:-}
      AUTH_DEV_SEED_CLIENT_PASSWORD: ${AUTH_DEV_SEED_CLIENT_PASSWORD:-}
    volumes:
      - ${COMPOSE_REPO_ROOT:-${PWD}}/infra/seed:/app/infra/seed:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health/').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  company-service:
    build:
      <<: *service-build
      dockerfile: services/company-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://company_svc:${COMPANY_DB_PASSWORD}@postgres:5432/company_db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health/').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  contract-service:
    build:
      <<: *service-build
      dockerfile: services/contract-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://contract_svc:${CONTRACT_DB_PASSWORD}@postgres:5432/contract_db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health/').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  contract-scheduler:
    build:
      <<: *service-build
      dockerfile: services/contract-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://contract_svc:${CONTRACT_DB_PASSWORD}@postgres:5432/contract_db
    volumes: *scheduler-volumes
    command: ['python', '/app/infra/scripts/cron-runner.py', '/app/infra/cron/contract.crontab']
    depends_on: *consumer-deps
    restart: unless-stopped

  finance-service:
    build:
      <<: *service-build
      dockerfile: services/finance-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://finance_svc:${FINANCE_DB_PASSWORD}@postgres:5432/finance_db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health/').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  finance-consumer:
    build:
      <<: *service-build
      dockerfile: services/finance-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://finance_svc:${FINANCE_DB_PASSWORD}@postgres:5432/finance_db
    command: ['python', 'manage.py', 'consume_finance_events']
    depends_on: *consumer-deps
    restart: unless-stopped

  finance-scheduler:
    build:
      <<: *service-build
      dockerfile: services/finance-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://finance_svc:${FINANCE_DB_PASSWORD}@postgres:5432/finance_db
    volumes: *scheduler-volumes
    command: ['python', '/app/infra/scripts/cron-runner.py', '/app/infra/cron/finance.crontab']
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  space-service:
    build:
      <<: *service-build
      dockerfile: services/space-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://space_svc:${SPACE_DB_PASSWORD}@postgres:5432/space_db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8005/health/').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  space-consumer:
    build:
      <<: *service-build
      dockerfile: services/space-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://space_svc:${SPACE_DB_PASSWORD}@postgres:5432/space_db
    command: ['python', 'manage.py', 'consume_space_events']
    depends_on: *consumer-deps
    restart: unless-stopped

  booking-service:
    build:
      <<: *service-build
      dockerfile: services/booking-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://booking_svc:${BOOKING_DB_PASSWORD}@postgres:5432/booking_db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8006/health/').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  booking-scheduler:
    build:
      <<: *service-build
      dockerfile: services/booking-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://booking_svc:${BOOKING_DB_PASSWORD}@postgres:5432/booking_db
    volumes: *scheduler-volumes
    command: ['python', '/app/infra/scripts/cron-runner.py', '/app/infra/cron/booking.crontab']
    depends_on: *consumer-deps
    restart: unless-stopped

  inventory-service:
    build:
      <<: *service-build
      dockerfile: services/inventory-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://inventory_svc:${INVENTORY_DB_PASSWORD}@postgres:5432/inventory_db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8007/health/').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  inventory-consumer:
    build:
      <<: *service-build
      dockerfile: services/inventory-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://inventory_svc:${INVENTORY_DB_PASSWORD}@postgres:5432/inventory_db
    command: ['python', 'manage.py', 'consume_inventory_events']
    depends_on: *consumer-deps
    restart: unless-stopped

  ticket-service:
    build:
      <<: *service-build
      dockerfile: services/ticket-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://ticket_svc:${TICKET_DB_PASSWORD}@postgres:5432/ticket_db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8008/health/').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  dashboard-service:
    build:
      <<: *service-build
      dockerfile: services/dashboard-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://dashboard_svc:${DASHBOARD_DB_PASSWORD}@postgres:5432/dashboard_db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8009/health/').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  dashboard-consumer:
    build:
      <<: *service-build
      dockerfile: services/dashboard-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://dashboard_svc:${DASHBOARD_DB_PASSWORD}@postgres:5432/dashboard_db
    command: ['python', 'manage.py', 'consume_dashboard_events']
    depends_on: *consumer-deps
    restart: unless-stopped

  document-service:
    build:
      <<: *service-build
      dockerfile: services/document-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgresql://document_svc:${DOCUMENT_DB_PASSWORD}@postgres:5432/document_db
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health/').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  frontend:
    build:
      <<: *service-build
      dockerfile: frontend/Dockerfile
    environment:
      TZ: Europe/Lisbon
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1:3000/']
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s

  gateway:
    build:
      <<: *service-build
      dockerfile: gateway/Dockerfile
    depends_on:
      auth-service:
        condition: service_healthy
      company-service:
        condition: service_healthy
      contract-service:
        condition: service_healthy
      finance-service:
        condition: service_healthy
      space-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      ticket-service:
        condition: service_healthy
      dashboard-service:
        condition: service_healthy
      document-service:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - '80:8080'
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1:8080/health']
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
