  finance-service:
    image: ${CI_REGISTRY_IMAGE}/finance-service:${IMAGE_TAG}
  finance-consumer:
    image: ${CI_REGISTRY_IMAGE}/finance-service:${IMAGE_TAG}
  finance-scheduler:
    image: ${CI_REGISTRY_IMAGE}/finance-service:${IMAGE_TAG}
  space-service:
    image: ${CI_REGISTRY_IMAGE}/space-service:${IMAGE_TAG}
  space-consumer:
    image: ${CI_REGISTRY_IMAGE}/space-service:${IMAGE_TAG}
  booking-service:
    image: ${CI_REGISTRY_IMAGE}/booking-service:${IMAGE_TAG}
  booking-scheduler:
    image: ${CI_REGISTRY_IMAGE}/booking-service:${IMAGE_TAG}
  inventory-service:
    image: ${CI_REGISTRY_IMAGE}/inventory-service:${IMAGE_TAG}
  inventory-consumer:
    image: ${CI_REGISTRY_IMAGE}/inventory-service:${IMAGE_TAG}
  ticket-service:
    image: ${CI_REGISTRY_IMAGE}/ticket-service:${IMAGE_TAG}
  dashboard-service:
    image: ${CI_REGISTRY_IMAGE}/dashboard-service:${IMAGE_TAG}
  dashboard-consumer:
