# Production image overlay.
# Use with:
#   IMAGE_TAG=<commit-sha> CI_REGISTRY_IMAGE=<registry/project> \
#   docker compose --env-file .env -f infra/docker-compose.yml -f infra/docker-compose.production.yml up -d --no-build
#
# The base compose file keeps build definitions for local development. This overlay
# pins deployable services to images pushed by GitLab CI.


services:
  auth-service:
    image: ${CI_REGISTRY_IMAGE}/auth-service:${IMAGE_TAG}
  company-service:
    image: ${CI_REGISTRY_IMAGE}/company-service:${IMAGE_TAG}
  contract-service:
    image: ${CI_REGISTRY_IMAGE}/contract-service:${IMAGE_TAG}
  contract-scheduler:
