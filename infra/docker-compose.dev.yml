# Layer with `docker compose -f infra/docker-compose.yml -f infra/docker-compose.dev.yml`.
# Used by Tilt (`tilt up`) for bind mounts and Django `runserver` live reload.

x-django-dev-env: &django-dev-env
  PYTHONPATH: /opt/ilb-py-common

services:
  auth-service:
    volumes:
      - ../services/auth-service:/app:delegated
      - ../libs/py-common:/opt/ilb-py-common:ro
    environment:
      <<: *django-dev-env
    command: ['/app/docker-entrypoint.sh', 'python', 'manage.py', 'runserver', '0.0.0.0:8001']

  company-service:
    volumes:
      - ../services/company-service:/app:delegated
      - ../libs/py-common:/opt/ilb-py-common:ro
    environment:
      <<: *django-dev-env
    command: ['/app/docker-entrypoint.sh', 'python', 'manage.py', 'runserver', '0.0.0.0:8002']

  contract-service:
