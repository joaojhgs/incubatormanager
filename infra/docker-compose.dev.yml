# Dev layer (use with repo root as Compose project directory):
#   docker compose --project-directory . -f infra/docker-compose.yml -f infra/docker-compose.dev.yml up
# Tilt loads the same files (see docker-compose.tilt.yml anchor).
#
# Bind-mounts each service tree + libs/py-common. Django is run under watchfiles with
# `runserver --noreload` so restarts are driven only by watchfiles (avoids nested
# autoreloaders in bind-mounted Docker volumes).

x-django-dev-env: &django-dev-env
  PYTHONPATH: /opt/ilb-py-common

services:
  auth-service:
    volumes:
      - ./services/auth-service:/app:delegated
      - ./infra/seed:/app/infra/seed:ro
      - ./libs/py-common:/opt/ilb-py-common:ro
    environment:
      <<: *django-dev-env
    command:
      - watchfiles
      - --filter
      - python
      - python manage.py runserver 0.0.0.0:8001 --noreload
      - /app
      - /opt/ilb-py-common

  company-service:
    volumes:
      - ./services/company-service:/app:delegated
      - ./libs/py-common:/opt/ilb-py-common:ro
    environment:
      <<: *django-dev-env
    command:
      - watchfiles
      - --filter
      - python
      - python manage.py runserver 0.0.0.0:8002 --noreload
      - /app
      - /opt/ilb-py-common

  contract-service:
