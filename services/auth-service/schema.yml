openapi: 3.0.3
info:
  title: ILB Auth Service API
  version: 0.1.0
  description: Authentication and identity API.
paths:
  /api/auth/health/:
    get:
      operationId: api_auth_health_retrieve
      description: Liveness/readiness-style health payload.
      tags:
        - api
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
          description: ''
  /api/auth/login/:
    post:
      operationId: api_auth_login_create
      description: Authenticate with email and password; returns a JWT access/refresh
        pair.
      summary: Login
      tags:
        - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: No active account found with the given credentials
          description: Unknown email, wrong password, or inactive user (same opaque
            message for all cases).
        '429':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Request was throttled. Expected available in 42 seconds.
          description: More than five login attempts per minute from this IP address.
  /api/auth/logout/:
    post:
      operationId: api_auth_logout_create
      description: Revoke the refresh; access may still be valid until its own expiry.
      summary: Logout
      tags:
        - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      responses:
        '204':
          description: Blocklisted; further refresh attempts for this JTI fail.
        '400':
          description: Validation error, for example a missing `refresh` field.
        '401':
          description: Malformed, expired, or otherwise invalid refresh token.
  /api/auth/refresh/:
    post:
      operationId: api_auth_refresh_create
      description: Exchange a valid refresh for new tokens; the old refresh cannot
        be reused after.
      summary: Refresh
      tags:
        - api
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh
              properties:
                refresh:
                  type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
          description: ''
  /auth/verify/:
    get:
      operationId: auth_verify_retrieve
      description: Validates a JWT access token and returns `X-User-Id`, `X-User-Role`,
        and `X-Company-Id` for the Nginx gateway to pass to upstream services. The
        gateway must forward the `Authorization` header to this subrequest.
      summary: Verify (gateway auth_request)
      tags:
        - gateway
      responses:
        '200':
          description: Access token valid; identity in response headers.
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                  code:
                    type: string
                    enum:
                      - token_not_valid
                      - user_not_found
                      - user_inactive
          description: ''
  /health/:
    get:
      operationId: health_retrieve
      description: Liveness/readiness-style health payload.
      tags:
        - health
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
          description: ''
components:
  schemas:
    LoginRequest:
      type: object
      description: Credentials accepted at login (matches ``TokenObtainPairSerializer``
        fields).
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password
    LogoutRequest:
      type: object
      description: Body for :meth:`core.views.LogoutView.post` — the refresh to revoke.
      properties:
        refresh:
          type: string
          writeOnly: true
      required:
        - refresh
    TokenPairResponse:
      type: object
      description: JWT access and refresh strings returned on successful login.
      properties:
        access:
          type: string
        refresh:
          type: string
      required:
        - access
        - refresh
