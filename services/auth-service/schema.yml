openapi: 3.0.3
info:
  title: ILB Auth Service API
  version: 0.1.0
  description: Authentication and identity API.
paths:
  /api/auth/health/:
    get:
      operationId: api_auth_health_retrieve
      description: Liveness/readiness-style health payload.
      tags:
      - api
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
          description: ''
  /api/auth/login/:
    post:
      operationId: api_auth_login_create
      description: Authenticate with email and password; returns a JWT access/refresh
        pair.
      summary: Login
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: No active account found with the given credentials
          description: Unknown email, wrong password, or inactive user (same opaque
            message for all cases).
        '429':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Request was throttled. Expected available in 42 seconds.
          description: More than five login attempts per minute from this IP address.
  /api/auth/logout/:
    get:
      operationId: api_auth_logout_retrieve
      description: Same-site browser fallback that clears the ilb.refresh_token httpOnly
        cookie and redirects to the optional safe `next` path. It does not blocklist
        a refresh token; use POST for revocation.
      summary: Clear refresh cookie
      tags:
      - api
      responses:
        '302':
          description: Refresh cookie cleared; redirect returned.
    post:
      operationId: api_auth_logout_create
      description: Revoke the refresh from the JSON body or ilb.refresh_token cookie.
        The refresh cookie is cleared on success and invalid-token responses.
      summary: Logout
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshCookieRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RefreshCookieRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RefreshCookieRequest'
      responses:
        '204':
          description: Blocklisted; further refresh attempts for this JTI fail.
        '400':
          description: Validation error, for example a missing refresh body/cookie.
        '401':
          description: Malformed, expired, or otherwise invalid refresh token.
  /api/auth/refresh/:
    post:
      operationId: api_auth_refresh_create
      description: Exchange a valid refresh for new tokens. The refresh may be sent
        in the JSON body or via the ilb.refresh_token httpOnly cookie; invalid refresh
        attempts clear that cookie.
      summary: Refresh
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshCookieRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RefreshCookieRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RefreshCookieRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
          description: ''
        '400':
          description: Missing refresh body/cookie.
        '401':
          description: Invalid, expired, blocklisted, or inactive-user refresh.
  /api/auth/schema/:
    get:
      operationId: api_auth_schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - ug
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/schema/swagger/:
    get:
      operationId: api_auth_schema_swagger_retrieve
      description: Interactive OpenAPI documentation for the auth service.
      summary: Swagger UI
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Swagger UI page (HTML).
  /api/auth/users/:
    get:
      operationId: api_auth_users_list
      description: Returns all users. Only accessible when the gateway-injected X-User-Role
        header is Director. Staff and Client receive 403.
      summary: List users (Director only)
      tags:
      - users
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserRead'
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: You do not have permission to perform this action.
          description: Forbidden — role is not Director.
    post:
      operationId: api_auth_users_create
      description: Creates a new user account. Password is write-only and never returned.
      summary: Create user (Director only)
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
          description: ''
        '400':
          description: Validation error.
        '403':
          description: Forbidden — role is not Director.
  /api/auth/users/{id}/:
    get:
      operationId: api_auth_users_retrieve
      description: Retrieve, update, or soft-delete a single user — Director only.
      summary: Retrieve user (Director only)
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - users
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
          description: ''
        '403':
          description: Forbidden — role is not Director.
        '404':
          description: User id not found.
    patch:
      operationId: api_auth_users_partial_update
      description: Retrieve, update, or soft-delete a single user — Director only.
      summary: Partially update user (Director only)
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
          description: ''
        '400':
          description: Validation error.
        '403':
          description: Forbidden — role is not Director.
        '404':
          description: User id not found.
    delete:
      operationId: api_auth_users_destroy
      description: Sets ``is_active`` to false; does not remove the row.
      summary: Soft-delete user (Director only)
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - users
      responses:
        '204':
          description: User deactivated.
        '403':
          description: Forbidden — role is not Director.
        '404':
          description: User id not found.
  /api/users/me/:
    get:
      operationId: api_users_me_retrieve
      description: Return the authenticated user's full profile. Role and company
        are read-only.
      summary: Get own profile
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    patch:
      operationId: api_users_me_partial_update
      description: Update first name, last name, or change password. Role, company,
        email, and active status are immutable.
      summary: Update own profile
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /auth/verify/:
    get:
      operationId: auth_verify_retrieve
      description: Validates a JWT access token and returns `X-User-Id`, `X-User-Role`,
        and `X-Company-Id` for the Nginx gateway to pass to upstream services. The
        gateway must forward the `Authorization` header to this subrequest.
      summary: Verify (gateway auth_request)
      tags:
      - gateway
      responses:
        '200':
          description: Access token valid; identity in response headers.
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                  code:
                    type: string
                    enum:
                    - token_not_valid
                    - user_not_found
                    - user_inactive
          description: ''
  /health/:
    get:
      operationId: health_retrieve
      description: Liveness/readiness-style health payload.
      tags:
      - health
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
          description: ''
components:
  schemas:
    LoginRequest:
      type: object
      description: Credentials accepted at login (matches ``TokenObtainPairSerializer``
        fields).
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
      - email
      - password
    PatchedUserProfileUpdate:
      type: object
      description: |-
        Write serializer for PATCH /users/me/.

        Allows updating ``first_name``, ``last_name``, and ``password``.
        ``role``, ``company_id``, ``email``, and ``is_active`` are immutable
        through this endpoint.
      properties:
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        old_password:
          type: string
          writeOnly: true
          description: Current password — required when setting a new password.
        new_password:
          type: string
          writeOnly: true
          description: New password. Must satisfy all Django password validators.
    PatchedUserUpdate:
      type: object
      description: Partial update of a user (Director only).
      properties:
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        role:
          $ref: '#/components/schemas/RoleEnum'
        company_id:
          type: string
          format: uuid
          nullable: true
        is_active:
          type: boolean
        password:
          type: string
          writeOnly: true
          description: New password — optional; omit to leave unchanged.
          minLength: 8
    RefreshCookieRequest:
      type: object
      description: Optional refresh body; the httpOnly refresh cookie is used when
        omitted.
      properties:
        refresh:
          type: string
    RoleEnum:
      enum:
      - Director
      - Staff
      - Client
      type: string
      description: |-
        * `Director` - Director
        * `Staff` - Staff
        * `Client` - Client
    TokenPairResponse:
      type: object
      description: JWT access and refresh strings returned on successful login.
      properties:
        access:
          type: string
        refresh:
          type: string
      required:
      - access
      - refresh
    UserCreate:
      type: object
      description: Payload for creating a user (Director only).
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
          minLength: 8
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        role:
          $ref: '#/components/schemas/RoleEnum'
        company_id:
          type: string
          format: uuid
          nullable: true
      required:
      - email
      - first_name
      - last_name
      - password
      - role
    UserProfile:
      type: object
      description: Read-only representation of the authenticated user's profile.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
        company_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        is_active:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - company_id
      - created_at
      - email
      - first_name
      - id
      - is_active
      - last_name
      - role
      - updated_at
    UserRead:
      type: object
      description: User row returned by Director-scoped user APIs.
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        company_id:
          type: string
          format: uuid
          nullable: true
        is_active:
          type: boolean
      required:
      - company_id
      - email
      - first_name
      - id
      - is_active
      - last_name
      - role
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
