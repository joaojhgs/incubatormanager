openapi: 3.0.3
info:
  title: ILB Auth Service API
  version: 0.1.0
  description: Authentication and identity API.
paths:
  /api/auth/health/:
    get:
      operationId: api_auth_health_retrieve
      description: Liveness/readiness-style health payload.
      tags:
      - api
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
          description: ''
  /api/auth/login/:
    post:
      operationId: api_auth_login_create
      description: Authenticate with email and password; returns a JWT access/refresh
        pair.
      summary: Login
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: No active account found with the given credentials
          description: Unknown email, wrong password, or inactive user (same opaque
            message for all cases).
        '429':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Request was throttled. Expected available in 42 seconds.
          description: More than five login attempts per minute from this IP address.
  /api/auth/logout/:
    post:
      operationId: api_auth_logout_create
      description: Revoke the refresh; access may still be valid until its own expiry.
      summary: Logout
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      responses:
        '204':
          description: Blocklisted; further refresh attempts for this JTI fail.
        '400':
          description: Validation error, for example a missing `refresh` field.
        '401':
          description: Malformed, expired, or otherwise invalid refresh token.
  /api/auth/refresh/:
    post:
      operationId: api_auth_refresh_create
      description: Exchange a valid refresh for new tokens; the old refresh cannot
        be reused after.
      summary: Refresh
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - refresh
              properties:
                refresh:
                  type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
          description: ''
  /auth/verify/:
    get:
      operationId: auth_verify_retrieve
      description: Validates a JWT access token and returns `X-User-Id`, `X-User-Role`,
        and `X-Company-Id` for the Nginx gateway to pass to upstream services. The
        gateway must forward the `Authorization` header to this subrequest.
      summary: Verify (gateway auth_request)
      tags:
        - gateway
      responses:
        '200':
          description: Access token valid; identity in response headers.
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                  code:
                    type: string
                    enum:
                      - token_not_valid
                      - user_not_found
                      - user_inactive
          description: ''
  /api/auth/schema/:
    get:
      operationId: api_auth_schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
        - in: query
          name: format
          schema:
            type: string
            enum:
              - json
              - yaml
        - in: query
          name: lang
          schema:
            type: string
            enum:
              - af
              - ar
              - ar-dz
              - ast
              - az
              - be
              - bg
              - bn
              - br
              - bs
              - ca
              - ckb
              - cs
              - cy
              - da
              - de
              - dsb
              - el
              - en
              - en-au
              - en-gb
              - eo
              - es
              - es-ar
              - es-co
              - es-mx
              - es-ni
              - es-ve
              - et
              - eu
              - fa
              - fi
              - fr
              - fy
              - ga
              - gd
              - gl
              - he
              - hi
              - hr
              - hsb
              - hu
              - hy
              - ia
              - id
              - ig
              - io
              - is
              - it
              - ja
              - ka
              - kab
              - kk
              - km
              - kn
              - ko
              - ky
              - lb
              - lt
              - lv
              - mk
              - ml
              - mn
              - mr
              - ms
              - my
              - nb
              - ne
              - nl
              - nn
              - os
              - pa
              - pl
              - pt
              - pt-br
              - ro
              - ru
              - sk
              - sl
              - sq
              - sr
              - sr-latn
              - sv
              - sw
              - ta
              - te
              - tg
              - th
              - tk
              - tr
              - tt
              - udm
              - ug
              - uk
              - ur
              - uz
              - vi
              - zh-hans
              - zh-hant
      tags:
        - api
      security:
        - cookieAuth: []
        - basicAuth: []
        - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/schema/swagger/:
    get:
      operationId: api_auth_schema_swagger_retrieve
      description: Interactive OpenAPI documentation for the auth service.
      summary: Swagger UI
      tags:
        - api
      security:
        - cookieAuth: []
        - basicAuth: []
        - {}
      responses:
        '200':
          description: Swagger UI page (HTML).
  /health/:
    get:
      operationId: health_retrieve
      description: Liveness/readiness-style health payload.
      tags:
      - health
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
          description: ''
components:
  schemas:
    LoginRequest:
      type: object
      description: Credentials accepted at login (matches ``TokenObtainPairSerializer``
        fields).
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
      - email
      - password
    LogoutRequest:
      type: object
      description: Body for :meth:`core.views.LogoutView.post` — the refresh to revoke.
      properties:
        refresh:
          type: string
          writeOnly: true
      required:
      - refresh
    TokenPairResponse:
      type: object
      description: JWT access and refresh strings returned on successful login.
      properties:
        access:
          type: string
        refresh:
          type: string
      required:
      - access
      - refresh
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
