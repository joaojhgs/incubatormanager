        - dashboard
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /health/:
    get:
      operationId: health_retrieve
      description: Liveness/readiness-style health payload.
      tags:
        - health
      responses:
        '200':
          content:
            application/json:
