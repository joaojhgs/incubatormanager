      tags:
        - api
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/dashboard/spaces/:
    get:
      operationId: api_dashboard_spaces_retrieve
      description: Space utilization analytics from contract and booking projections.
      tags:
        - api
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /dashboard/companies/:
    get:
      operationId: dashboard_companies_retrieve
      description: Company analytics from materialized company and employee projections.
      tags:
        - dashboard
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /dashboard/finance/:
    get:
      operationId: dashboard_finance_retrieve
      description: Finance analytics from payment projections and cold-start finance
