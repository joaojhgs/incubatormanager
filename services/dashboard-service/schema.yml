openapi: 3.0.3
info:
  title: ILB Dashboard Service API
  version: 0.1.0
  description: Dashboard bounded context API.
paths:
  /api/dashboard/companies/:
    get:
      operationId: api_dashboard_companies_retrieve
      description: Company analytics from materialized company and employee projections.
      tags:
        - api
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/dashboard/finance/:
    get:
      operationId: api_dashboard_finance_retrieve
      description: Finance analytics from payment projections and cold-start finance
        snapshots.
      tags:
        - api
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/dashboard/health/:
    get:
      operationId: api_dashboard_health_retrieve
      description: Liveness/readiness-style health payload.
      tags:
        - api
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
          description: ''
  /api/dashboard/overview/:
    get:
      operationId: api_dashboard_overview_retrieve
      description: Staff dashboard with materialized KPIs and downstream health snapshots.
      tags:
        - api
