openapi: 3.0.3
info:
  title: ILB Company Service API
  version: 0.1.0
  description: Company bounded context API (stub).
paths:
  /api/companies/:
    get:
      operationId: api_companies_list
      description: Paginated company list with optional filters (`cae`, `maturity`,
        `is_active`) and `search` across name / tax ID / legal representative. Directors
        and Staff see all companies; Clients only see their row (`X-Company-Id`).
      parameters:
      - in: query
        name: cae
        schema:
          type: string
          format: uuid
      - in: query
        name: is_active
        schema:
          type: boolean
      - in: query
        name: maturity
        schema:
          type: string
          format: uuid
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - api
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCompanyListList'
          description: ''
  /api/companies/cae/:
    get:
      operationId: api_companies_cae_list
      description: List CAE codes for any authenticated user; create is Director-only.
      tags:
      - api
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CAE'
          description: ''
    post:
      operationId: api_companies_cae_create
      description: List CAE codes for any authenticated user; create is Director-only.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CAE'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CAE'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CAE'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CAE'
          description: ''
  /api/companies/health/:
    get:
      operationId: api_companies_health_retrieve
      description: Liveness/readiness-style health payload.
      tags:
      - api
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
          description: ''
  /api/companies/maturity-stages/:
    get:
      operationId: api_companies_maturity_stages_list
      description: List maturity stages. Any authenticated role.
      tags:
      - api
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MaturityStage'
          description: ''
    post:
      operationId: api_companies_maturity_stages_create
      description: Create a maturity stage. Director only.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaturityStage'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MaturityStage'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MaturityStage'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaturityStage'
          description: ''
  /api/companies/maturity-stages/{id}/:
    get:
      operationId: api_companies_maturity_stages_retrieve
      description: Retrieve one maturity stage. Any authenticated role.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this maturity stage.
        required: true
      tags:
      - api
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaturityStage'
          description: ''
    patch:
      operationId: api_companies_maturity_stages_partial_update
      description: Partially update a maturity stage. Director only.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this maturity stage.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMaturityStage'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMaturityStage'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMaturityStage'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaturityStage'
          description: ''
  /health/:
    get:
      operationId: health_retrieve
      description: Liveness/readiness-style health payload.
      tags:
      - health
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
          description: ''
components:
  schemas:
    CAE:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        code:
          type: string
          maxLength: 16
        description:
          type: string
          maxLength: 255
      required:
      - code
      - description
      - id
    CompanyList:
      type: object
      description: Company row for GET /companies; nested FKs via select_related (no
        employee list).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        tax_id:
          type: string
          readOnly: true
        address:
          type: string
          readOnly: true
        phone:
          type: string
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        legal_representative:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        cae:
          allOf:
          - $ref: '#/components/schemas/CAE'
          readOnly: true
        maturity_stage:
          allOf:
          - $ref: '#/components/schemas/MaturityStage'
          readOnly: true
      required:
      - address
      - cae
      - created_at
      - description
      - email
      - id
      - is_active
      - legal_representative
      - maturity_stage
      - name
      - phone
      - tax_id
      - updated_at
    MaturityStage:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          $ref: '#/components/schemas/NameEnum'
        rate_per_sqm:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        description:
          type: string
          maxLength: 255
        display_order:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
      required:
      - id
      - name
      - rate_per_sqm
    NameEnum:
      enum:
      - Incubated
      - Startup
      - Intermediate
      - Consolidated
      type: string
      description: |-
        * `Incubated` - Incubated
        * `Startup` - Startup
        * `Intermediate` - Intermediate
        * `Consolidated` - Consolidated
    PaginatedCompanyListList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/CompanyList'
    PatchedMaturityStage:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          $ref: '#/components/schemas/NameEnum'
        rate_per_sqm:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        description:
          type: string
          maxLength: 255
        display_order:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
